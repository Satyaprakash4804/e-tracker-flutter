name: etracker_app
description: "Employee Tracker App"

version: 1.0.0+4   # 👈 increase + number for every update

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  package_info_plus: ^9.0.0
 
  battery_plus: ^5.0.3

  photo_view: ^0.15.0
  url_launcher: ^6.2.5


 # State & storage
  get: ^4.6.6
  get_storage: ^2.1.1

  image_picker: ^1.0.7
  file_selector: ^1.0.3

  # Background tasks
  background_fetch: ^1.3.0
  flutter_foreground_task: ^6.1.2

  # Location
  geolocator: ^11.1.0
  permission_handler: ^11.3.1

  # Network
  http: ^1.2.0
  socket_io_client: ^2.0.3

  # Local storage
  sqflite: ^2.3.0
  path_provider: ^2.1.3

  record: ^6.2.0

  # Maps / WebView
  mappls_gl: ^1.2.1
  webview_flutter: ^4.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/marker.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
